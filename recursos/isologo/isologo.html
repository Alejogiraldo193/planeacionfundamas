<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Animación SVG M +</title>

<style>
  body {
    margin: 0;
    background: #0f0f0f;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  svg {
    width: 500px;
  }

  /* =========================
     DIBUJO DE LA M
  ========================= */
  .m-draw {
    fill: none;
    stroke: #ffffff;
    stroke-width: 5;

    stroke-dasharray: 3000;
    stroke-dashoffset: 3000;

    animation: drawM 2.5s cubic-bezier(.65,0,.35,1) forwards;
  }

  @keyframes drawM {
    to {
      stroke-dashoffset: 0;
    }
  }

  /* =========================
     MOVIMIENTO DEL +
  ========================= */
  .plus {
    fill: #ffffff;
    transform-box: fill-box;
    transform-origin: center;

    animation: movePlus 2.5s ease forwards, bouncePlus 0.7s ease 2.5s;
  }

  @keyframes movePlus {
    0% {
      transform: translate(-60px, 40px) scale(0.9);
      opacity: 0;
    }

    20% {
      opacity: 1;
    }

    50% {
      transform: translate(-20px, 10px) scale(1);
    }

    100% {
      transform: translate(0px, 0px) scale(1);
    }
  }

  @keyframes bouncePlus {
    0% { transform: translate(0, 0) scale(1); }
    25% { transform: translate(0, -20px) scale(1.1); }
    50% { transform: translate(0, 8px) scale(0.95); }
    70% { transform: translate(0, -10px) scale(1.05); }
    85% { transform: translate(0, 4px) scale(0.98); }
    100% { transform: translate(0, 0) scale(1); }
  }

</style>
