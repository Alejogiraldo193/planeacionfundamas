<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Isologo Animado</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
}
.wrap { display: flex; flex-direction: column; align-items: center; gap: 1rem; }
.wrap svg { width: 260px; height: auto; overflow: visible; }
</style>
</head>
<body>
<div class="wrap">
<svg viewBox="0 0 1327.13 842.75" xmlns="http://www.w3.org/2000/svg">
<defs>
  <mask id="rm">
    <rect x="0" y="0" width="1400" height="900" fill="black"/>
    <rect id="mr" x="0" y="0" width="0" height="900" fill="white"/>
  </mask>
</defs>

<g mask="url(#rm)">
  <path fill="#000" transform="translate(-103.22 -39.51)"
    d="M644.26,314a305.73,305.73,0,0,0-34.51,35c-7.49,8.92-11.54,9-19,.19-.54-.63-1.09-1.26-1.62-1.9C551.67,302.77,506.49,270,450,253.57,411.61,242.4,373,239.63,333.9,247.08q-99.87,19-165.73,96.86c-41.89,49.58-64.22,107-64.6,171.85-.69,120.33-.15,240.66-.12,361v5.46h102.3V867.62q0-172.75,0-345.5c0-25.52,4.93-50.28,16.26-73.06,28.81-58,74.73-93.07,140-100.15,34.77-3.77,67.92,2.56,97.75,21.34,54.86,34.52,85,83.24,84.84,149.41-.27,119.49,0,239,0,358.49,0,1.28.13,2.57.21,4.11H645.8v-6.94q0-97.94,0-195.87h-1.56Z
    M645.28,515.18c2.29-32.81,13.57-62.73,33.26-89.43,49.12-66.63,132.13-93,210.9-70.1,50.92,14.8,89.64,46.84,118.26,91s42.29,93,41.53,145.8c-.2,13.76-.79,27.52-1.2,41.52h100.52c.43-8.71.87-17,1.25-25.33,3.11-68.18-9.7-133-41.78-193.51-32-60.36-77.53-107.75-138.42-139.25-76.9-39.77-156.41-44-237.37-13.74a291.68,291.68,0,0,0-88.88,52.45V680.06h1.55q0-76,0-152.12Q644.85,521.49,645.28,515.18Z"/>

<g id="cg">
  <path fill="#000" d="M1089.92,39.52c-49.75.77-85.88,39.41-86,87.4-.17,48.15,39.5,87,87,86.54,47.09-.46,85.6-40.05,85-87.41C1175.25,78.06,1136.33,38.8,1089.92,39.52Z" transform="translate(-103.22 -39.51)"/>

</div>

<script>
var mr=document.getElementById('mr');
var cg=document.getElementById('cg');
var pp=document.getElementById('pp');

var raf,start;

var mDur=2000,pDelay=0.75,pDur=600;
var ccx=986.7,ccy=44,cx=724.78,cy=542.99;
var sA=42,ov=-9;
var revealW=1327;

function eOut(t){return 1-Math.pow(1-t,3);}
function eIO(t){return t<0.5?2*t*t:-1+(4-2*t)*t;}

function getAngle(p){
  if(p<=0.75) return sA+(ov-sA)*eOut(p/0.75);
  return ov+(0-ov)*eOut((p-0.75)/0.25);
}
function setPlus(o,a){
  pp.setAttribute('opacity',o);
  pp.setAttribute('transform','rotate('+a+','+cx+','+cy+') translate(-103.22,-39.51)');
}
function setCircle(o,sy){
  cg.setAttribute('opacity',o);
  cg.setAttribute('transform',
    'translate('+ccx+','+ccy+') scale(1,'+sy+') translate('+(-ccx)+','+(-ccy)+')');
}

function animate(ts){
  if(!start) start=ts;
  var elapsed=ts-start;
  var p=Math.min(elapsed/mDur,1);
  var e=eIO(p);

  // M: reveal
  mr.setAttribute('width',e*revealW);

  // + y círculo: ambos arrancan en pDelay, terminan en pEnd
  var pStart=mDur*pDelay, pEnd=mDur+pDur;
  var pP=Math.max(0,Math.min((elapsed-pStart)/(pEnd-pStart),1));
  var ePP=eIO(pP);

  setPlus(ePP, getAngle(pP));
  setCircle(ePP, 1);

  if(elapsed<pEnd){raf=requestAnimationFrame(animate);}
  else{
    mr.setAttribute('width',revealW);
    setPlus(1,0);
    setCircle(1,1);
    setTimeout(wink,300);
  }
}

function wink(){
  var ws=null,wd=380;
  function f(ts){
    if(!ws) ws=ts;
    var t=Math.min((ts-ws)/wd,1);
    var sy;
    if(t<0.4) sy=1-eOut(t/0.4);
    else if(t<0.7) sy=eOut((t-0.4)/0.3)*1.15;
    else sy=1.15-0.15*eOut((t-0.7)/0.3);
    setCircle(1,sy);
    if(t<1) requestAnimationFrame(f);
    else setCircle(1,1);
  }
  requestAnimationFrame(f);
}

function play(){
  cancelAnimationFrame(raf);
  start=null;
  mr.setAttribute('width',0);
  setPlus(0,sA);
  setCircle(0,1);
  setTimeout(function(){raf=requestAnimationFrame(animate);},50);
}


setTimeout(play,400);
</script>
</body>
</html>
